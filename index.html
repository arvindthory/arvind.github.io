<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arvind — Coming Soon</title>
<meta name="description" content="Arvind's site is being built. Coming soon.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0e13;
    --surface:#12161d;
    --line:#1f2530;
    --text:#eef1f5;
    --muted:#6b7280;
    --accent:#3fe8c4;
    --accent-dim:#3fe8c422;
    --sans:'Space Grotesk', sans-serif;
    --mono:'JetBrains Mono', monospace;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html,body{ height:100%; }

  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:24px;
    position:relative;
    overflow:hidden;
  }

  a{ color:inherit; }

  /* faint grid backdrop */
  .grid-bg{
    position:fixed;
    inset:0;
    z-index:0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size:64px 64px;
    opacity:0.35;
    mask-image:radial-gradient(ellipse 70% 60% at 50% 40%, black 30%, transparent 75%);
  }

  .glow{
    position:fixed;
    top:20%; left:50%;
    width:900px; height:500px;
    transform:translateX(-50%);
    background:radial-gradient(ellipse, var(--accent-dim), transparent 70%);
    z-index:0;
    pointer-events:none;
  }

  .stage{
    position:relative;
    z-index:2;
    width:100%;
    max-width:640px;
  }

  /* ---------- terminal boot block ---------- */
  .terminal{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 30px 80px -20px rgba(0,0,0,0.6);
  }

  .term-bar{
    display:flex;
    align-items:center;
    gap:8px;
    padding:12px 16px;
    border-bottom:1px solid var(--line);
  }

  .dot{ width:10px; height:10px; border-radius:50%; background:#333944; }

  .term-title{
    margin-left:8px;
    font-family:var(--mono);
    font-size:0.72rem;
    color:var(--muted);
    letter-spacing:0.05em;
  }

  .term-body{
    padding:22px 20px 26px;
    font-family:var(--mono);
    font-size:0.85rem;
    color:var(--muted);
    min-height:150px;
  }

  .term-body .line{
    opacity:0;
    margin-bottom:8px;
    animation:appear 0.3s forwards;
  }

  .term-body .line .ok{ color:var(--accent); }
  .term-body .line .path{ color:var(--text); }

  @keyframes appear{ to{ opacity:1; } }

  .cursor-line{
    display:inline-block;
    width:8px; height:14px;
    background:var(--accent);
    vertical-align:middle;
    margin-left:4px;
    animation:blink 0.9s steps(1) infinite;
  }

  @keyframes blink{ 50%{ opacity:0; } }

  /* ---------- reveal content (hidden until boot finishes) ---------- */
  .reveal{
    margin-top:40px;
    opacity:0;
    transform:translateY(16px);
    transition:opacity 0.7s ease, transform 0.7s ease;
  }

  .reveal.show{ opacity:1; transform:translateY(0); }

  .eyebrow{
    font-family:var(--mono);
    font-size:0.75rem;
    letter-spacing:0.15em;
    text-transform:uppercase;
    color:var(--accent);
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:18px;
  }

  .eyebrow::before{
    content:'';
    width:7px; height:7px;
    border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 10px var(--accent);
    animation:pulse 2s infinite ease-in-out;
  }

  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:0.35;} }

  h1{
    font-size:clamp(2.6rem, 8vw, 4.4rem);
    font-weight:700;
    line-height:1;
    letter-spacing:-0.02em;
  }

  h1 span{ color:var(--accent); }

  p.sub{
    margin-top:18px;
    color:var(--muted);
    font-size:1.02rem;
    max-width:46ch;
    line-height:1.6;
  }

  /* progress bar */
  .progress-wrap{
    margin-top:32px;
  }

  .progress-labels{
    display:flex;
    justify-content:space-between;
    font-family:var(--mono);
    font-size:0.72rem;
    color:var(--muted);
    margin-bottom:8px;
    text-transform:uppercase;
    letter-spacing:0.05em;
  }

  .progress-track{
    height:6px;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:99px;
    overflow:hidden;
  }

  .progress-fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg, var(--accent), #2bb8a0);
    border-radius:99px;
    transition:width 1.6s cubic-bezier(.4,0,.2,1);
  }

  /* notify form */
  .notify{
    margin-top:36px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }

  .notify input{
    flex:1;
    min-width:200px;
    background:var(--surface);
    border:1px solid var(--line);
    color:var(--text);
    padding:14px 16px;
    border-radius:8px;
    font-family:var(--sans);
    font-size:0.92rem;
    outline:none;
    transition:border-color 0.2s ease;
  }

  .notify input:focus{ border-color:var(--accent); }
  .notify input::placeholder{ color:var(--muted); }

  .notify button{
    padding:14px 24px;
    border-radius:8px;
    border:1px solid var(--accent);
    background:var(--accent);
    color:#0b0e13;
    font-family:var(--sans);
    font-weight:600;
    font-size:0.92rem;
    cursor:pointer;
    transition:transform 0.2s ease, opacity 0.2s ease;
  }

  .notify button:hover{ transform:translateY(-2px); }

  .notify-msg{
    margin-top:12px;
    font-family:var(--mono);
    font-size:0.78rem;
    color:var(--accent);
    min-height:1em;
  }

  .socials{
    margin-top:44px;
    display:flex;
    gap:26px;
    font-family:var(--mono);
    font-size:0.8rem;
    color:var(--muted);
  }

  .socials a{ transition:color 0.2s ease; }
  .socials a:hover{ color:var(--accent); }

  footer{
    margin-top:50px;
    font-family:var(--mono);
    font-size:0.72rem;
    color:var(--muted);
    opacity:0.7;
  }
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="glow"></div>

<div class="stage">

  <div class="terminal">
    <div class="term-bar">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      <span class="term-title">arvindthory.com — build log</span>
    </div>
    <div class="term-body" id="termBody"></div>
  </div>

  <div class="reveal" id="revealBlock">
    <div class="eyebrow">Site under construction</div>
    <h1>Something's<br><span>brewing.</span></h1>
    <p class="sub">I'm building arvindthory.com from the ground up — projects, writing, and everything I'm working on. It'll be live soon.</p>

    <div class="progress-wrap">
      <div class="progress-labels">
        <span>Progress</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <form class="notify" id="notifyForm">
      <input type="email" id="notifyEmail" placeholder="you@email.com" required>
      <button type="submit">Notify me</button>
    </form>
    <div class="notify-msg" id="notifyMsg"></div>

    <div class="socials">
      <a href="https://github.com/arvindthory" target="_blank" rel="noopener">GitHub ↗</a>
      <a href="mailto:arvind@arvindthory.com">Email ↗</a>
    </div>

    <footer>© <span id="year"></span> Arvind — built in public.</footer>
  </div>

</div>

<script>
  const bootLines = [
    "$ initializing arvindthory.com <span class='ok'>[ok]</span>",
    "$ loading design system <span class='ok'>[ok]</span>",
    "$ writing pages <span class='path'>./about ./work ./contact</span>",
    "$ status: <span class='ok'>almost there...</span>"
  ];

  const termBody = document.getElementById('termBody');
  let i = 0;

  function typeNextLine(){
    if(i < bootLines.length){
      const el = document.createElement('div');
      el.className = 'line';
      el.style.animationDelay = '0s';
      el.innerHTML = bootLines[i];
      termBody.appendChild(el);
      i++;
      setTimeout(typeNextLine, 480);
    } else {
      const cursorEl = document.createElement('span');
      cursorEl.className = 'cursor-line';
      termBody.appendChild(cursorEl);
      setTimeout(revealContent, 500);
    }
  }

  function revealContent(){
    document.getElementById('revealBlock').classList.add('show');
    requestAnimationFrame(() => {
      setTimeout(() => {
        const pct = 72; // adjust this number as your real progress changes
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('progressPct').textContent = pct + '%';
      }, 200);
    });
  }

  setTimeout(typeNextLine, 300);

  // notify form (front-end only demo — see notes below to wire it up for real)
  document.getElementById('notifyForm').addEventListener('submit', function(e){
    e.preventDefault();
    const msg = document.getElementById('notifyMsg');
    msg.textContent = "$ saved — I'll email you when it's live.";
  });

  document.getElementById('year').textContent = new Date().getFullYear();
</script>

</body>
</html>
